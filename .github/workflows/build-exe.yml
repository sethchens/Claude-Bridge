name: Build Magic Installer EXE

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Bundle the EXE with PyInstaller
      run: |
        pyinstaller --onefile --console `
          --add-data "wrapper;wrapper" `
          --add-data "CLAUDE.md;." `
          --add-data "poll_pubsub.sh;." `
          setup_wizard.py
          
    - name: Zip Executable (Bypass Browser Blocks)
      run: Compress-Archive -Path dist/setup_wizard.exe -DestinationPath dist/Claude-Bridge-Setup.zip
          
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Claude-Bridge-Setup
        path: dist/Claude-Bridge-Setup.zip

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest Setup Release"
        files: dist/Claude-Bridge-Setup.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
